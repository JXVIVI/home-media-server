services:
  # VPN Gateway
  gluetun:
    image: qmcgaw/gluetun
    container_name: vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${PROTON_PRIVATE_KEY}
      - SERVER_COUNTRIES=Netherlands # Change to your preference
    ports:
      - 8080:8080 # qBittorrent Web UI
    restart: unless-stopped

  # Torrent Client
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun" # Use the VPN's network
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ./qbittorrent-config:/config
      - ${HDD_MOUNT}/downloads:/downloads
    depends_on:
      - gluetun
    restart: unless-stopped

  # Media Server
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    # network_mode host is best for DLNA and local discovery
    network_mode: host
    user: ${PUID}:${PGID}
    volumes:
      - ./jellyfin-data/config:/config
      - ./jellyfin-data/cache:/cache
      - ${HDD_MOUNT}/movies:/data/movies:ro # Mounts your HDD movies as read-only
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128 # Intel QuickSync (Haswell support)
    restart: unless-stopped
