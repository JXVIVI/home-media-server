services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    security_opt:
      - apparmor:unconfined
    env_file:
      - .env
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - VPN_PORT_FORWARDING_UP_COMMAND=wget -qO- --post-data="json={\"listen_port\":{{PORT}}}" http://127.0.0.1:8080/api/v2/app/setPreferences
    ports:
      - 8080:8080
      - 8090:8090
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    security_opt:
      - apparmor:unconfined
    env_file:
      - .env
    environment:
      - WEBUI_PORT=8080
    volumes:
      - /srv/home-media-server/qbittorrent-config:/config
      - /mnt/media-storage/media:/downloads
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    network_mode: host
    security_opt:
      - apparmor:unconfined
    env_file:
      - .env
    user: ${PUID}:${PGID}
    volumes:
      - /srv/home-media-server/jellyfin-data/config:/config
      - /srv/home-media-server/jellyfin-data/cache:/cache
      - /mnt/media-storage/media:/data/media:ro
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    restart: unless-stopped
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host  # Directly on the hardware for accurate stats
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'

  # --- Monitoring ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    network_mode: host  # So it can reach everything on localhost
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    network_mode: host  # So it can reach Prometheus on localhost:9090
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

  # --- EXPORTERS ---
  qbittorrent-exporter:
    image: ghcr.io/martabal/qbittorrent-exporter:latest
    container_name: qbittorrent-exporter
    restart: unless-stopped
    network_mode: "service:gluetun" # Stay inside VPN
    environment:
      - QBITTORRENT_BASE_URL=http://localhost:8080
      - QBITTORRENT_USER=${QBIT_USERNAME}
      - QBITTORRENT_PASSWORD=${QBIT_PASSWORD}

  jellyfin-exporter:
    image: rebelcore/jellyfin-exporter:latest
    container_name: jellyfin-exporter
    restart: unless-stopped
    network_mode: host # Jellyfin is on host mode, so this must be too
    environment:
      - JELLYFIN_ADDRESS=http://127.0.0.1:8096
      - JELLYFIN_TOKEN=${JELLYFIN_API_KEY}    
