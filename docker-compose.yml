services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    security_opt:
      - apparmor:unconfined
    env_file:
      - .env
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - VPN_PORT_FORWARDING_UP_COMMAND=wget -qO- --post-data="json={\"listen_port\":{{PORT}}}" http://127.0.0.1:8080/api/v2/app/setPreferences
    ports:
      - 8080:8080
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    security_opt:
      - apparmor:unconfined
    env_file:
      - .env
    environment:
      - WEBUI_PORT=8080
    volumes:
      - /srv/home-media-server/qbittorrent-config:/config
      - /mnt/media-storage/media:/downloads
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    network_mode: host
    security_opt:
      - apparmor:unconfined
    env_file:
      - .env
    user: ${PUID}:${PGID}
    volumes:
      - /srv/home-media-server/jellyfin-data/config:/config
      - /srv/home-media-server/jellyfin-data/cache:/cache
      - /mnt/media-storage/media:/data/media:ro
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    restart: unless-stopped
